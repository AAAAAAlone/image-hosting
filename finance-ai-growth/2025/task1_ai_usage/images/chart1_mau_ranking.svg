<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="white"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1F2937">2025年12月 AI原生App MAU排名</text>
  <text x="400" y="480" text-anchor="middle" font-size="11" fill="#9CA3AF">数据来源：QuestMobile《2025年AI应用层发展核心报告》</text>
  <!-- Y axis -->
  <line x1="120" y1="70" x2="120" y2="430" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="120" y1="430" x2="700" y2="430" stroke="#E5E7EB" stroke-width="1"/>
  <line x1="120" y1="330" x2="700" y2="330" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="120" y1="230" x2="700" y2="230" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="4"/>
  <line x1="120" y1="130" x2="700" y2="130" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="4"/>
  <!-- Labels -->
  <text x="110" y="434" text-anchor="end" font-size="11" fill="#6B7280">0</text>
  <text x="110" y="334" text-anchor="end" font-size="11" fill="#6B7280">1亿</text>
  <text x="110" y="234" text-anchor="end" font-size="11" fill="#6B7280">2亿</text>
  <text x="110" y="134" text-anchor="end" font-size="11" fill="#6B7280">3亿</text>
  <!-- Bars: scale: 1亿 = 100px height, max=2.26亿 -->
  <!-- 豆包 2.26亿 -->
  <rect x="180" y="104" width="120" height="326" rx="6" fill="#3B82F6"/>
  <text x="240" y="94" text-anchor="middle" font-size="16" font-weight="bold" fill="#3B82F6">2.26亿</text>
  <text x="240" y="460" text-anchor="middle" font-size="14" fill="#374151">豆包</text>
  <!-- DeepSeek 1.35亿 -->
  <rect x="360" y="227" width="120" height="203" rx="6" fill="#8B5CF6"/>
  <text x="420" y="217" text-anchor="middle" font-size="16" font-weight="bold" fill="#8B5CF6">1.35亿</text>
  <text x="420" y="460" text-anchor="middle" font-size="14" fill="#374151">DeepSeek</text>
  <!-- 元宝 0.41亿 -->
  <rect x="540" y="371" width="120" height="59" rx="6" fill="#10B981"/>
  <text x="600" y="361" text-anchor="middle" font-size="16" font-weight="bold" fill="#10B981">0.41亿</text>
  <text x="600" y="460" text-anchor="middle" font-size="14" fill="#374151">元宝</text>
</svg>