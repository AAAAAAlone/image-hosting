<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#0f172a" rx="12"/>
  <text x="300" y="35" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold" font-family="sans-serif">金山WPS — GEO长期效果累积</text>
  <text x="300" y="55" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif">数据来源：加搜科技公开案例</text>
  
  <!-- KPI cards -->
  <rect x="30" y="80" width="160" height="90" fill="#1e293b" rx="10" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="110" y="115" text-anchor="middle" fill="#60a5fa" font-size="28" font-weight="bold" font-family="sans-serif">10万+</text>
  <text x="110" y="140" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif">关键词进入Top10</text>
  <text x="110" y="160" text-anchor="middle" fill="#64748b" font-size="10" font-family="sans-serif">覆盖长尾搜索矩阵</text>
  
  <rect x="220" y="80" width="160" height="90" fill="#1e293b" rx="10" stroke="#22c55e" stroke-width="1.5"/>
  <text x="300" y="115" text-anchor="middle" fill="#4ade80" font-size="28" font-weight="bold" font-family="sans-serif">170×</text>
  <text x="300" y="140" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif">流量增长倍数</text>
  <text x="300" y="160" text-anchor="middle" fill="#64748b" font-size="10" font-family="sans-serif">月UV超100万</text>
  
  <rect x="410" y="80" width="160" height="90" fill="#1e293b" rx="10" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="490" y="115" text-anchor="middle" fill="#fbbf24" font-size="28" font-weight="bold" font-family="sans-serif">1亿+</text>
  <text x="490" y="140" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="sans-serif">原创页面总收录</text>
  <text x="490" y="160" text-anchor="middle" fill="#64748b" font-size="10" font-family="sans-serif">搜索引擎总收录量</text>
  
  <!-- Timeline -->
  <line x1="50" y1="220" x2="550" y2="220" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="220" r="8" fill="#3b82f6"/>
  <circle cx="300" cy="220" r="8" fill="#22c55e"/>
  <circle cx="550" cy="220" r="8" fill="#f59e0b"/>
  <text x="50" y="245" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">项目启动</text>
  <text x="300" y="245" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">流量爆发</text>
  <text x="550" y="245" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif">持续增长</text>
  <text x="50" y="262" text-anchor="middle" fill="#64748b" font-size="10" font-family="sans-serif">第1个月</text>
  <text x="300" y="262" text-anchor="middle" fill="#64748b" font-size="10" font-family="sans-serif">第6个月</text>
  <text x="550" y="262" text-anchor="middle" fill="#64748b" font-size="10" font-family="sans-serif">第72个月</text>
  
  <text x="300" y="290" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold" font-family="sans-serif">⏱ 超过6年持续合作，2000天排名持续增长</text>
</svg>