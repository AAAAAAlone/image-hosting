<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#0f172a" rx="12"/>
  <text x="300" y="35" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="bold" font-family="sans-serif">服务能力数据总览</text>
  
  <!-- Left: 迁移科技案例 -->
  <rect x="30" y="55" width="250" height="110" fill="#1e293b" rx="8"/>
